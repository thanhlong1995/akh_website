<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKH Quán</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
          <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z" fill="#fff" fill-opacity=".9"/>
        </svg>
        AKH Quán
      </div>

      <nav>
        <a href="#dashboard" data-page="dashboard">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
            <rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor" fill-opacity=".85"/>
            <rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor" fill-opacity=".85"/>
            <rect x="3" y="13" width="8" height="8" rx="1.5" fill="currentColor" fill-opacity=".85"/>
            <rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor" fill-opacity=".85"/>
          </svg>
          Tổng quan
        </a>
        <a href="#orders" data-page="orders">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          Tạo đơn hàng
        </a>
        <a href="#products" data-page="products">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path d="M4 6h16M4 10h16M4 14h10M4 18h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Sản phẩm
        </a>
        <a href="#report" data-page="report">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path d="M4 20V14M9 20V8M14 20V11M19 20V4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          Báo cáo
        </a>
      </nav>

      <button id="logout-btn" class="sidebar-logout">
        <svg width="17" height="17" fill="none" viewBox="0 0 24 24">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Đăng xuất
      </button>
    </aside>

    <!-- Main area -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="hamburger" class="btn-icon hamburger" aria-label="Mở menu">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
              <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <h1 id="page-title">Tổng quan</h1>
        </div>
        <div class="topbar-right">
          <span id="current-date"></span>
          <button id="topbar-btn" class="btn btn-primary" style="display:none"></button>
        </div>
      </header>

      <main id="content">
        <div class="loading-screen">Đang tải...</div>
      </main>
    </div>

  </div>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Login page -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z" fill="#185FA5" fill-opacity=".9"/>
        </svg>
        AKH Quán
      </div>
      <h2 class="login-title">Đăng nhập</h2>
      <form id="login-form" autocomplete="on">
        <div class="form-field">
          <label for="login-user">Tên đăng nhập</label>
          <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="login-pass">Mật khẩu</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p id="login-err" class="login-err"></p>
        <button type="submit" class="btn btn-primary" style="width:100%;height:40px">Đăng nhập</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
